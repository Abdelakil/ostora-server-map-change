name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    - name: Build plugin
      run: dotnet publish -c Release

    - name: Create zip
      run: |
        cd build/publish/OstoraServerRestart
        zip -r ../../../OstoraServerRestart.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OstoraServerRestart
        path: OstoraServerRestart.zip
